<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>

<!-- TELA INICIAL -->
<div class="start-screen" id="startScreen">
  <div class="intro-text">Algumas histórias não começam por acaso...</div>
  <div class="tap">Toque para começar</div>
</div>

<audio id="music" src="assets/musica.mp3"></audio>

<div class="container hidden" id="mainContent">

  <canvas id="bgCanvas"></canvas>

  <!-- SLIDE 1 -->
  <div class="slide active">
    <img src="assets/foto1.jpg" class="photo">
    <p class="typewriter">Desde aquele primeiro momento...</p>
  </div>

  <!-- SLIDE 2 -->
  <div class="slide">
    <img src="assets/foto2.jpg" class="photo">
    <p class="typewriter">Eu já sentia que era diferente...</p>
  </div>

  <!-- SLIDE 3 -->
  <div class="slide">
    <img src="assets/foto3.jpg" class="photo">
    <p class="typewriter">Cada detalhe ao seu lado virou especial...</p>
  </div>

  <!-- SLIDE TIMER -->
  <div class="slide">
    <div class="timer-box">
      <div class="big-number" id="days">0</div>
      <div class="label">DIAS</div>

      <div class="time-row">
        <div>
          <div class="small-number" id="hours">00</div>
          <div class="label">HOR</div>
        </div>
        <div>
          <div class="small-number" id="minutes">00</div>
          <div class="label">MIN</div>
        </div>
        <div>
          <div class="small-number" id="seconds">00</div>
          <div class="label">SEG</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SLIDE FINAL -->
  <div class="slide final">
    <h1>Quer namorar comigo?</h1>
    <div class="buttons">
      <button class="btn-sim">SIM ❤️</button>
      <button class="btn-nao">NÃO</button>
    </div>
    <p id="respostaFinal"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
